<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MILTOS Café – Digitale Karte</title>
  <meta name="theme-color" content="#f6f2ec" />

  <style>
    :root{
      /* Brand */
      --green:#16a34a;
      --green2:#22c55e;
      --brown:#3a2415;
      --brown2:#5a3b1e;

      /* Light / Premium */
      --bg1:#fbfaf8;
      --bg2:#f3efe8;
      --text:#0f172a;
      --muted:rgba(15,23,42,.62);
      --glass: rgba(255,255,255,.72);
      --glass2: rgba(255,255,255,.85);
      --line: rgba(15,23,42,.10);
      --shadow: 0 24px 70px rgba(2,6,23,.14);
      --r: 22px;
      --max: 520px;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, "Helvetica Neue", sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 600px at 16% 10%, rgba(34,197,94,.18), transparent 55%),
        radial-gradient(900px 600px at 84% 14%, rgba(90,59,30,.14), transparent 55%),
        radial-gradient(900px 600px at 50% 110%, rgba(22,163,74,.12), transparent 55%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      overflow:hidden;
    }

    /* Soft moving light */
    .glow{
      position: fixed;
      inset: -20%;
      background:
        radial-gradient(closest-side at 30% 28%, rgba(34,197,94,.18), transparent 62%),
        radial-gradient(closest-side at 72% 36%, rgba(90,59,30,.14), transparent 62%),
        radial-gradient(closest-side at 50% 86%, rgba(34,197,94,.10), transparent 62%);
      filter: blur(44px);
      opacity: .85;
      animation: floaty 12s ease-in-out infinite;
      pointer-events:none;
    }
    @keyframes floaty{
      0%{ transform: translate3d(0,0,0) scale(1); }
      50%{ transform: translate3d(0,-10px,0) scale(1.02); }
      100%{ transform: translate3d(0,0,0) scale(1); }
    }

    .wrap{
      min-height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 22px;
      position: relative;
      z-index: 1;
    }

    .card{
      width: min(var(--max), 94vw);
      border-radius: calc(var(--r) + 10px);
      background: linear-gradient(180deg, var(--glass2), var(--glass));
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      overflow:hidden;

      transform: translateY(8px);
      opacity: 0;
      animation: enter .55s ease-out forwards;
    }
    @keyframes enter{ to{ transform: translateY(0); opacity: 1; } }

    .top{
      padding: 26px 18px 18px;
      display:grid;
      gap: 10px;
      justify-items:center;
      text-align:center;
      position: relative;
      border-bottom: 1px solid rgba(15,23,42,.08);
      background:
        radial-gradient(800px 260px at 50% 0%, rgba(34,197,94,.10), transparent 65%),
        radial-gradient(800px 260px at 50% 0%, rgba(90,59,30,.08), transparent 70%);
    }

    .logo{
      width: min(320px, 78vw);
      height:auto;
      filter: drop-shadow(0 10px 18px rgba(2,6,23,.18));
      transform: translateY(-2px);
      animation: pop .85s cubic-bezier(.2,.9,.2,1) .03s both;
      border-radius: 14px;
    }
    @keyframes pop{
      from{ transform: translateY(-8px) scale(.985); opacity:0; }
      to{ transform: translateY(-2px) scale(1); opacity:1; }
    }

    .fallback{
      display:none;
      font-weight: 900;
      letter-spacing: .08em;
      color: var(--brown);
      background: rgba(90,59,30,.08);
      border: 1px solid rgba(90,59,30,.14);
      padding: 14px 16px;
      border-radius: 16px;
    }

    .sub{
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .content{ padding: 16px 18px 22px; }

    .btns{ display:grid; gap: 12px; }

    .btn{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
      padding: 16px 16px;
      border-radius: var(--r);
      text-decoration:none;
      color: #0b0b0b;
      background: rgba(255,255,255,.92);
      border: 1px solid rgba(15,23,42,.10);
      box-shadow: 0 10px 24px rgba(2,6,23,.10);
      transition: transform .12s ease, box-shadow .12s ease, filter .12s ease;
      -webkit-tap-highlight-color: transparent;
      font-weight: 850;
      letter-spacing: .01em;
    }
    .btn:hover{
      transform: translateY(-1px);
      box-shadow: 0 16px 34px rgba(2,6,23,.14);
      filter: brightness(1.01);
    }
    .btn:active{ transform: scale(.99); }

    .btn .left{
      display:flex;
      align-items:center;
      gap: 12px;
      min-width: 0;
    }
    .dot{
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: var(--brown2);
      box-shadow: 0 0 0 6px rgba(90,59,30,.14);
      flex: 0 0 auto;
    }
    .label{
      font-size: 18px;
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
    }
    .chev{
      font-size: 18px;
      opacity: .45;
      flex: 0 0 auto;
    }

    .btn.green{
      color: #ffffff;
      background: linear-gradient(135deg, rgba(34,197,94,.98), rgba(22,163,74,.90));
      border: 1px solid rgba(22,163,74,.22);
      box-shadow: 0 14px 30px rgba(22,163,74,.16), 0 10px 24px rgba(2,6,23,.10);
    }
    .btn.green .dot{
      background: #ffffff;
      box-shadow: 0 0 0 6px rgba(255,255,255,.16);
    }

    .foot{
      padding: 10px 18px 16px;
      color: rgba(15,23,42,.50);
      font-size: 12px;
      text-align:center;
      border-top: 1px solid rgba(15,23,42,.08);
      background: rgba(255,255,255,.45);
    }
  </style>
</head>

<body>
  <div class="glow" aria-hidden="true"></div>

  <div class="wrap">
    <div class="card" role="main" aria-label="MILTOS digitale Karte">
      <div class="top">
        <!-- WICHTIG: Datei muss im Root exakt so heißen: miltos-logo.png -->
        <img class="logo" src="miltos-logo.png" alt="MILTOS Café"
             onerror="this.style.display='none'; document.getElementById('fallback').style.display='block';" />
        <div id="fallback" class="fallback">MILTOS</div>
        <p class="sub">Digitale Karte • bitte auswählen</p>
      </div>

      <div class="content">
        <div class="btns">
          <a class="btn" href="https://cafe-miltos.github.io/Cafe-Miltos-Speisekarte/Karte%20caf%C3%A9%202026%20new.pdf" target="_blank" rel="noopener">
            <span class="left">
              <span class="dot" aria-hidden="true"></span>
              <span class="label">Speisen &amp; Getränke</span>
            </span>
            <span class="chev" aria-hidden="true">›</span>
          </a>

          <a class="btn green" href="https://cafe-miltos.github.io/Cafe-Miltos-Speisekarte/Eiskarte2026%20new.pdf" target="_blank" rel="noopener">
            <span class="left">
              <span class="dot" aria-hidden="true"></span>
              <span class="label">Eiskarte</span>
            </span>
            <span class="chev" aria-hidden="true">›</span>
          </a>
        </div>
      </div>

      <div class="foot">© <span id="y"></span> MILTOS Café</div>
    </div>
  </div>

  <script>
    document.getElementById("y").textContent = new Date().getFullYear();
  </script>
</body>
</html>
