<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MILTOS Café – Digitale Karte</title>
  <meta name="theme-color" content="#1b120b" />
  <style>
    :root{
      /* Brand */
      --green:#16a34a;
      --green2:#22c55e;
      --brown:#2a170c;
      --brown2:#4a2a14;

      /* UI */
      --text:#ffffff;
      --muted: rgba(255,255,255,.72);
      --glass: rgba(255,255,255,.10);
      --glass2: rgba(255,255,255,.14);
      --line: rgba(255,255,255,.16);
      --shadow: 0 24px 80px rgba(0,0,0,.45);
      --r: 22px;
      --max: 520px;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, "Helvetica Neue", sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 600px at 18% 10%, rgba(34,197,94,.22), transparent 55%),
        radial-gradient(900px 600px at 82% 20%, rgba(90,59,30,.22), transparent 55%),
        radial-gradient(900px 600px at 50% 110%, rgba(22,163,74,.18), transparent 55%),
        linear-gradient(135deg, #0f0a06 0%, var(--brown) 45%, #0b1a10 100%);
      overflow:hidden;
    }

    .glow{
      position: fixed;
      inset: -20%;
      background:
        radial-gradient(closest-side at 30% 30%, rgba(34,197,94,.22), transparent 60%),
        radial-gradient(closest-side at 70% 40%, rgba(90,59,30,.22), transparent 60%),
        radial-gradient(closest-side at 50% 80%, rgba(34,197,94,.14), transparent 62%);
      filter: blur(40px);
      opacity: .9;
      animation: floaty 10s ease-in-out infinite;
      pointer-events:none;
    }
    @keyframes floaty{
      0%{ transform: translate3d(0,0,0) scale(1); }
      50%{ transform: translate3d(0,-10px,0) scale(1.03); }
      100%{ transform: translate3d(0,0,0) scale(1); }
    }

    .wrap{
      min-height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 22px;
      position: relative;
      z-index: 1;
    }

    .card{
      width: min(var(--max), 94vw);
      border-radius: calc(var(--r) + 8px);
      background: linear-gradient(180deg, var(--glass2), var(--glass));
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      overflow:hidden;
      transform: translateY(8px);
      opacity: 0;
      animation: enter .6s ease-out forwards;
    }
    @keyframes enter{
      to{ transform: translateY(0); opacity: 1; }
    }

    .top{
      padding: 26px 18px 18px;
      display:grid;
      gap: 10px;
      justify-items:center;
      text-align:center;
      position: relative;
    }
    .top:before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(800px 260px at 50% 0%, rgba(34,197,94,.20), transparent 60%),
        radial-gradient(800px 260px at 50% 0%, rgba(90,59,30,.16), transparent 62%);
      pointer-events:none;
    }

    .logo{
      width: min(340px, 78vw);
      height:auto;
      filter: drop-shadow(0 10px 22px rgba(0,0,0,.35));
      transform: translateY(-2px);
      animation: pop .9s cubic-bezier(.2,.9,.2,1) .05s both;
      position: relative;
      z-index: 1;
    }
    @keyframes pop{
      from{ transform: translateY(-6px) scale(.98); opacity:0; }
      to{ transform: translateY(-2px) scale(1); opacity:1; }
    }

    .sub{
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 13px;
      position: relative;
      z-index: 1;
    }

    .content{
      padding: 16px 18px 22px;
      border-top: 1px solid rgba(255,255,255,.10);
    }

    .btns{
      display:grid;
      gap: 12px;
      margin-top: 8px;
    }

    .btn{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
      padding: 16px 16px;
      border-radius: var(--r);
      text-decoration:none;
      color: #0b0b0b;
      background: rgba(255,255,255,.92);
      border: 1px solid rgba(255,255,255,.25);
      box-shadow: 0 10px 26px rgba(0,0,0,.22);
      transition: transform .12s ease, box-shadow .12s ease, filter .12s ease;
      -webkit-tap-highlight-color: transparent;
      font-weight: 800;
      letter-spacing: .01em;
    }
    .btn:active{ transform: scale(.99); }

    .btn .left{
      display:flex;
      align-items:center;
      gap: 12px;
      min-width: 0;
    }
    .dot{
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: var(--brown2);
      box-shadow: 0 0 0 6px rgba(90,59,30,.18);
      flex: 0 0 auto;
    }
    .btn .label{
      font-size: 18px;
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
    }
    .chev{
      font-size: 18px;
      opacity: .55;
      flex: 0 0 auto;
    }

    .btn.green{
      color: #ffffff;
      background: linear-gradient(135deg, rgba(34,197,94,.98), rgba(22,163,74,.92));
      border: 1px solid rgba(34,197,94,.35);
      box-shadow: 0 14px 34px rgba(22,163,74,.25), 0 10px 26px rgba(0,0,0,.22);
    }
    .btn.green .dot{
      background: #ffffff;
      box-shadow: 0 0 0 6px rgba(255,255,255,.18);
    }
    .btn:hover{
      transform: translateY(-1px);
      box-shadow: 0 16px 40px rgba(0,0,0,.28);
      filter: brightness(1.01);
    }

    .foot{
      padding: 10px 18px 16px;
      color: rgba(255,255,255,.55);
      font-size: 12px;
      text-align:center;
      border-top: 1px solid rgba(255,255,255,.08);
    }
  </style>
</head>

<body>
  <div class="glow" aria-hidden="true"></div>

  <div class="wrap">
    <div class="card" role="main" aria-label="MILTOS digitale Karte">
      <div class="top">
        <!-- Logo liegt im Root: miltos-logo.png -->
        <img class="logo" src="miltos-logo.png" alt="MILTOS Café" />
        <p class="sub">Digitale Karte • bitte auswählen</p>
      </div>

      <div class="content">
        <div class="btns">
          <a class="btn" href="https://cafe-miltos.github.io/Cafe-Miltos-Speisekarte/Karte%20caf%C3%A9%202026%20new.pdf" target="_blank" rel="noopener">
            <span class="left">
              <span class="dot" aria-hidden="true"></span>
              <span class="label">Speisen &amp; Getränke</span>
            </span>
            <span class="chev" aria-hidden="true">›</span>
          </a>

          <a class="btn green" href="https://cafe-miltos.github.io/Cafe-Miltos-Speisekarte/Eiskarte2026%20new.pdf" target="_blank" rel="noopener">
            <span class="left">
              <span class="dot" aria-hidden="true"></span>
              <span class="label">Eiskarte</span>
            </span>
            <span class="chev" aria-hidden="true">›</span>
          </a>
        </div>
      </div>

      <div class="foot">© <span id="y"></span> MILTOS Café</div>
    </div>
  </div>

  <script>
    document.getElementById("y").textContent = new Date().getFullYear();
  </script>
</body>
</html>
