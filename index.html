<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MILTOS Café – Digitale Karte</title>
  <meta name="theme-color" content="#f6f2ec" />

  <style>
    :root{
      --green:#16a34a;
      --green2:#22c55e;
      --brown:#3a2415;
      --brown2:#5a3b1e;

      --bg1:#fbfaf8;
      --bg2:#f1ede6;
      --text:#0f172a;
      --muted:rgba(15,23,42,.62);

      --glass: rgba(255,255,255,.70);
      --glass2: rgba(255,255,255,.86);
      --line: rgba(15,23,42,.10);
      --shadow: 0 22px 70px rgba(2,6,23,.14);
      --r: 22px;

      --max: 560px;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, "Helvetica Neue", sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 600px at 16% 10%, rgba(34,197,94,.18), transparent 55%),
        radial-gradient(900px 600px at 84% 14%, rgba(90,59,30,.14), transparent 55%),
        radial-gradient(900px 600px at 50% 110%, rgba(22,163,74,.10), transparent 55%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      overflow-x:hidden;
    }

    /* Apple-like soft moving light */
    .glow{
      position: fixed;
      inset: -20%;
      background:
        radial-gradient(closest-side at 30% 28%, rgba(34,197,94,.16), transparent 62%),
        radial-gradient(closest-side at 72% 36%, rgba(90,59,30,.12), transparent 62%),
        radial-gradient(closest-side at 50% 86%, rgba(34,197,94,.08), transparent 62%);
      filter: blur(44px);
      opacity: .9;
      animation: floaty 12s ease-in-out infinite;
      pointer-events:none;
    }
    @keyframes floaty{
      0%{ transform: translate3d(0,0,0) scale(1); }
      50%{ transform: translate3d(0,-10px,0) scale(1.02); }
      100%{ transform: translate3d(0,0,0) scale(1); }
    }

    .wrap{
      min-height:100%;
      display:grid;
      place-items:center;
      padding: 18px;
      position: relative;
      z-index: 1;
    }

    .card{
      width: min(var(--max), 96vw);
      border-radius: calc(var(--r) + 12px);
      background: linear-gradient(180deg, var(--glass2), var(--glass));
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      overflow:hidden;

      transform: translateY(8px);
      opacity: 0;
      animation: enter .55s ease-out forwards;
    }
    @keyframes enter{ to{ transform: translateY(0); opacity: 1; } }

    /* Top area with true 3D perspective */
    .top{
      padding: 26px 18px 14px;
      display:grid;
      justify-items:center;
      text-align:center;
      gap: 10px;
      border-bottom: 1px solid rgba(15,23,42,.08);

      /* Important: perspective enables “depth” */
      perspective: 900px;
      transform-style: preserve-3d;

      background:
        radial-gradient(900px 280px at 50% 0%, rgba(34,197,94,.10), transparent 65%),
        radial-gradient(900px 280px at 50% 0%, rgba(90,59,30,.08), transparent 70%);
    }

    .logoWrap{
      transform-style: preserve-3d;
      will-change: transform, opacity, filter;
    }

    /* 3D “fly from depth”: translateZ + rotateX + blur */
    .logo{
      width: min(320px, 80vw);
      height:auto;
      border-radius: 14px;
      filter: drop-shadow(0 12px 18px rgba(2,6,23,.16));
      opacity: 0;

      transform:
        translate3d(0, 22px, 0)
        translateZ(-280px)
        rotateX(18deg)
        scale(.92);

      animation: logo3d 1050ms cubic-bezier(.18,.95,.18,1) 60ms forwards;
    }

    @keyframes logo3d{
      0%{
        opacity: 0;
        transform:
          translate3d(0, 28px, 0)
          translateZ(-340px)
          rotateX(22deg)
          scale(.90);
        filter: blur(3px) drop-shadow(0 0 0 rgba(0,0,0,0));
      }
      70%{
        opacity: 1;
        transform:
          translate3d(0, -6px, 0)
          translateZ(18px)
          rotateX(0deg)
          scale(1.02);
        filter: blur(0px) drop-shadow(0 18px 26px rgba(2,6,23,.18));
      }
      100%{
        opacity: 1;
        transform:
          translate3d(0, 0, 0)
          translateZ(0px)
          rotateX(0deg)
          scale(1);
        filter: blur(0px) drop-shadow(0 12px 18px rgba(2,6,23,.16));
      }
    }

    .welcome{
      margin: 0;
      font-weight: 900;
      font-size: 18px;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeUp .55s ease-out 520ms forwards;
    }
    .sub{
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeUp .55s ease-out 680ms forwards;
    }
    @keyframes fadeUp{
      to{ opacity:1; transform: translateY(0); }
    }

    .spinner{
      width: 28px; height: 28px;
      border-radius: 999px;
      border: 3px solid rgba(15,23,42,.18);
      border-top-color: rgba(34,197,94,.75);
      animation: spin 1s linear infinite;
      margin-top: 6px;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeUp .55s ease-out 820ms forwards, spin 1s linear infinite;
    }
    @keyframes spin{ to{ transform: rotate(360deg); } }

    /* Menu section appears after delay, logo stays */
    .menu{
      padding: 16px 18px 18px;
      display: none;
    }

    .btns{ display:grid; gap: 12px; }

    .btn{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
      padding: 16px 16px;
      border-radius: var(--r);
      text-decoration:none;
      color: #0b0b0b;
      background: rgba(255,255,255,.92);
      border: 1px solid rgba(15,23,42,.10);
      box-shadow: 0 10px 24px rgba(2,6,23,.10);
      transition: transform .12s ease, box-shadow .12s ease, filter .12s ease;
      -webkit-tap-highlight-color: transparent;
      font-weight: 850;
      letter-spacing: .01em;
      cursor: pointer;
      opacity: 0;
      transform: translateY(10px);
    }

    .btn.show{
      opacity: 1;
      transform: translateY(0);
      transition: opacity .38s ease, transform .38s ease, box-shadow .12s ease, filter .12s ease;
    }

    .btn:hover{
      transform: translateY(-1px);
      box-shadow: 0 16px 34px rgba(2,6,23,.14);
      filter: brightness(1.01);
    }
    .btn:active{ transform: scale(.99); }

    .btn .left{
      display:flex;
      align-items:center;
      gap: 12px;
      min-width: 0;
    }
    .dot{
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: var(--brown2);
      box-shadow: 0 0 0 6px rgba(90,59,30,.14);
      flex: 0 0 auto;
    }
    .label{
      font-size: 18px;
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
    }
    .chev{
      font-size: 18px;
      opacity: .45;
      flex: 0 0 auto;
    }

    .btn.green{
      color: #ffffff;
      background: linear-gradient(135deg, rgba(34,197,94,.98), rgba(22,163,74,.90));
      border: 1px solid rgba(22,163,74,.22);
      box-shadow: 0 14px 30px rgba(22,163,74,.16), 0 10px 24px rgba(2,6,23,.10);
    }
    .btn.green .dot{
      background: #ffffff;
      box-shadow: 0 0 0 6px rgba(255,255,255,.16);
    }

    footer{
      padding: 12px 18px 16px;
      color: rgba(15,23,42,.52);
      font-size: 12px;
      text-align:center;
      border-top: 1px solid rgba(15,23,42,.08);
      background: rgba(255,255,255,.45);
    }
    footer a{
      color: rgba(15,23,42,.72);
      text-decoration: none;
      font-weight: 700;
    }
    footer a:hover{ text-decoration: underline; }

    /* Reduce motion for accessibility */
    @media (prefers-reduced-motion: reduce){
      .glow, .logo, .welcome, .sub, .spinner{ animation: none !important; }
      .btn{ transition: none !important; opacity: 1 !important; transform: none !important; }
      .menu{ display:block !important; }
    }
  </style>
</head>

<body>
  <div class="glow" aria-hidden="true"></div>

  <div class="wrap">
    <div class="card" role="main" aria-label="MILTOS digitale Karte">

      <section class="top">
        <!-- Logo liegt im Root exakt so: miltos-logo.png -->
        <div class="logoWrap">
          <img class="logo" src="miltos-logo.png" alt="MILTOS Café" />
        </div>

        <p class="welcome">Herzlich willkommen</p>
        <p class="sub">Bitte auswählen – die Karte öffnet sich direkt.</p>
        <div class="spinner" id="spinner" aria-hidden="true"></div>
      </section>

      <section class="menu" id="menu">
        <div class="btns">
          <!-- Öffnet direkt PDF (ohne Viewer auf der Seite) -->
          <a class="btn" id="b1" href="Karte%20caf%C3%A9%202026%20new.pdf" target="_blank" rel="noopener">
            <span class="left">
              <span class="dot" aria-hidden="true"></span>
              <span class="label">Speisen &amp; Getränke</span>
            </span>
            <span class="chev" aria-hidden="true">›</span>
          </a>

          <a class="btn green" id="b2" href="Eiskarte2026%20new.pdf" target="_blank" rel="noopener">
            <span class="left">
              <span class="dot" aria-hidden="true"></span>
              <span class="label">Eiskarte</span>
            </span>
            <span class="chev" aria-hidden="true">›</span>
          </a>
        </div>
      </section>

      <footer>
        © <span id="y"></span> MILTOS Café · <a href="impressum.html">Impressum</a>
      </footer>
    </div>
  </div>

  <script>
    document.getElementById("y").textContent = new Date().getFullYear();

    // >>> HIER EINSTELLEN: Wann soll die Auswahl erscheinen?
    // Millisekunden: 1200 = 1.2s, 2000 = 2.0s, 2800 = 2.8s
    const REVEAL_MS = 2600;

    const menu = document.getElementById("menu");
    const spinner = document.getElementById("spinner");
    const b1 = document.getElementById("b1");
    const b2 = document.getElementById("b2");

    window.addEventListener("load", () => {
      setTimeout(() => {
        menu.style.display = "block";
        spinner.style.display = "none";

        // Buttons weich einblenden (stagger)
        requestAnimationFrame(() => {
          b1.classList.add("show");
          setTimeout(() => b2.classList.add("show"), 120);
        });
      }, REVEAL_MS);
    });
  </script>
</body>
</html>
